name: Resurface
options:
  bundleIdPrefix: dev.willworth
  deploymentTarget:
    iOS: "17.0"
targets:
  Resurface:
    type: application
    platform: iOS
    sources:
      - Resurface
    info:
      path: Resurface/Info.plist
      properties:
        CFBundleDisplayName: Resurface
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.willworth.resurface
        DEVELOPMENT_TEAM: BNV6853573
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
